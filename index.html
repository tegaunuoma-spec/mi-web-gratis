<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Audio - Base de Datos</title>
    <style>
        :root {
            --bg-principal: #161920;
            --bg-tarjeta: #1f242e;
            --texto: #e4e7ed;
            --texto-secundario: #8a95a5;
            --pastel-azul: #6c8eae;
            --pastel-rojo: #b86b6b;
            --borde: #2d3545;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .bunker-panel {
            border: 1px solid var(--borde);
            padding: 30px;
            border-radius: 20px;
            background: var(--bg-tarjeta);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            text-align: center;
        }

        .status-monitor {
            font-size: 0.85rem;
            color: var(--texto-secundario);
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        #track-titulo {
            color: var(--pastel-azul);
            font-weight: bold;
        }

        /* Input de Búsqueda Estilizado */
        .search-box {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--borde);
            border-radius: 8px;
            color: var(--texto);
            font-size: 0.9rem;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: var(--pastel-azul);
        }

        /* Lista Ordenada Estilizada */
        .track-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 25px;
            padding-left: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .track-item {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        .track-item:hover {
            background: rgba(108, 142, 174, 0.1);
            color: var(--pastel-azul);
        }

        /* Scrollbar personalizado para la lista */
        .track-list::-webkit-scrollbar {
            width: 6px;
        }
        .track-list::-webkit-scrollbar-thumb {
            background: var(--borde);
            border-radius: 3px;
        }

        audio {
            width: 100%;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="bunker-panel">
        <h1>Búnker de Transmisión</h1>
        
        <div class="status-monitor">
            <span>📡 CANAL: </span>
            <span id="track-titulo">Ninguna pista en reproducción</span>
        </div>

        <input type="text" id="buscador" class="search-box" placeholder="Buscar artista, canción o género...">
        
        <ol id="lista-canciones" class="track-list">
            <li class="track-item" data-url="musica/musica_bunker.mp3" data-name="Mi Pista Inicial (Búnker)">
                <strong>Tu Música Local</strong> - Mi Pista Inicial
            </li>
            <li class="track-item" data-url="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" data-name="SoundHelix - Frecuencia Alfa 01">
                <strong>SoundHelix</strong> - Frecuencia Alfa 01
            </li>
            <li class="track-item" data-url="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" data-name="SoundHelix - Frecuencia Beta 02">
                <strong>SoundHelix</strong> - Frecuencia Beta 02
            </li>
            <li class="track-item" data-url="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" data-name="SoundHelix - Pulso Gamma 03">
                <strong>SoundHelix</strong> - Pulso Gamma 03
            </li>
            <li class="track-item" data-url="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" data-name="SoundHelix - Orbita Delta 04">
                <strong>SoundHelix</strong> - Orbita Delta 04
            </li>
        </ol>

        <audio id="reproductor" controls>
            <source id="audio-origen" src="" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const reproductor = document.getElementById('reproductor');
        const audioOrigen = document.getElementById('audio-origen');
        const trackTitulo = document.getElementById('track-titulo');
        const buscador = document.getElementById('buscador');
        const items = document.querySelectorAll('.track-item');

        // Lógica de reproducción al hacer clic en un elemento de la lista
        items.forEach(item => {
            item.addEventListener('click', function() {
                const urlCancion = this.getAttribute('data-url');
                const nombreCancion = this.getAttribute('data-name');

                audioOrigen.src = urlCancion;
                trackTitulo.textContent = nombreCancion;

                reproductor.load();
                reproductor.play();
            });
        });

        // El motor de filtrado en tiempo real (Buscador)
        buscador.addEventListener('input', function() {
            const filtro = this.value.toLowerCase();
            
            items.forEach(item => {
                const textoItem = item.textContent.toLowerCase();
                // Si el texto de la canción incluye lo que escribes, se queda. Si no, se oculta.
                if(textoItem.includes(filtro)) {
                    item.style.display = "list-item";
                } else {
                    item.style.display = "none";
                }
            });
        });
    </script>

</body>
</html>
