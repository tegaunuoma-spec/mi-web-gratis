<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Búnker de Audio: Catálogo Curado</title>
    <style>
        /* Estilos base (Mismo tono oscuro) */
        body { background: #161920; color: #e4e7ed; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { width: 100%; max-width: 500px; background: #1f242e; padding: 20px; border-radius: 15px; }
        .categoria { margin-top: 20px; }
        .track-card { 
            display: flex; align-items: center; background: #161920; 
            margin: 10px 0; padding: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #2d3545;
        }
        .track-card img { width: 50px; height: 50px; border-radius: 5px; margin-right: 15px; }
        .info { font-size: 0.8rem; }
        .info h4 { margin: 0; color: #6c8eae; }
    </style>
</head>
<body>

<div class="panel">
    <h1>Catálogo de Audio</h1>
    <div id="contenedor-biblioteca"></div>
    <audio id="player" controls style="width: 100%; margin-top: 20px;"></audio>
</div>

<script>
    // Tu Base de Datos categorizada
    const biblioteca = [
        {
            genero: "Electrónica Alfa",
            temas: [
                { titulo: "Frecuencia 01", artista: "Babata Core", desc: "Beat profundo para enfoque.", img: "https://via.placeholder.com/50", url: "musica/musica_bunker.mp3" }
            ]
        },
        {
            genero: "Jazz Espacial",
            temas: [
                { titulo: "Nebulosa", artista: "Jazz Unit", desc: "Sonido atmosférico.", img: "https://via.placeholder.com/50", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" }
            ]
        }
    ];

    const contenedor = document.getElementById('contenedor-biblioteca');
    const player = document.getElementById('player');

    // Generar la interfaz dinámicamente
    biblioteca.forEach(cat => {
        contenedor.innerHTML += `<h3>${cat.genero}</h3>`;
        cat.temas.forEach(tema => {
            contenedor.innerHTML += `
                <div class="track-card" onclick="document.getElementById('player').src='${tema.url}'; document.getElementById('player').play()">
                    <img src="${tema.img}">
                    <div class="info">
                        <h4>${tema.titulo} - ${tema.artista}</h4>
                        <p>${tema.desc}</p>
                    </div>
                </div>
            `;
        });
    });
</script>
</body>
</html>
