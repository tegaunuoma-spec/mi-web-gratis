<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de la Humanidad</title>
    <style>
        :root {
            --bg: #101010;
            --texto: #d1d1d1;
            --acento: #c5a059; /* Dorado envejecido */
        }
        body { background-color: var(--bg); color: var(--texto); font-family: 'Georgia', serif; margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 50px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: auto; }
        .obra { background: #1a1a1a; padding: 15px; border-radius: 5px; transition: transform 0.3s; }
        .obra:hover { transform: translateY(-10px); border: 1px solid var(--acento); }
        .obra img { width: 100%; height: 250px; object-fit: cover; border-radius: 2px; }
        h2 { color: var(--acento); margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Galería de la Humanidad</h1>
    <p>Un registro visual de nuestro legado</p>
</header>

<div class="galeria" id="lista-obras">
    </div>

<script>
    const obras = [
        { titulo: "La Mona Lisa", artista: "Leonardo da Vinci", desc: "El retrato más famoso del Renacimiento.", img: "https://upload.wikimedia.org/wikipedia/commons/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg" },
        { titulo: "La Noche Estrellada", artista: "Vincent van Gogh", desc: "Una visión expresionista del cielo nocturno.", img: "https://upload.wikimedia.org/wikipedia/commons/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg" },
        { titulo: "El Pensador", artista: "Auguste Rodin", desc: "La representación de la filosofía y el intelecto humano.", img: "https://upload.wikimedia.org/wikipedia/commons/d/d4/Le_Penseur_-_Mus%C3%A9e_Rodin.jpg" }
    ];

    const contenedor = document.getElementById('lista-obras');
    obras.forEach(obra => {
        contenedor.innerHTML += `
            <div class="obra">
                <img src="${obra.img}" alt="${obra.titulo}">
                <h2>${obra.titulo}</h2>
                <p><strong>${obra.artista}</strong></p>
                <p>${obra.desc}</p>
            </div>
        `;
    });
</script>
</body>
</html>
