<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia da Arte - Megagaleria 300+</title>
    <style>
        :root {
            --bg-bunker: #12110f;
            --bg-tarjeta: #fcfaf5;
            --azul-sorolla: #1b4b8a;
            --naranja-acento: #d66613;
            --verde-oliva: #4a6b56;
            --texto-oscuro: #2a241f;
            --texto-claro: #ece5d8;
        }

        body {
            background-color: var(--bg-bunker);
            color: var(--texto-claro);
            font-family: 'Georgia', serif;
            margin: 0; padding: 0;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            border-bottom: 4px solid var(--naranja-acento);
            background: #1a1815;
        }

        header h1 { font-size: 2.8rem; text-transform: uppercase; margin: 0; }
        header h1 span { color: var(--naranja-acento); }

        .filtro-bar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(18, 17, 15, 0.95);
            backdrop-filter: blur(8px);
            display: flex; justify-content: center; gap: 10px;
            padding: 15px; border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .btn-filtro {
            background: none; border: 1px solid var(--azul-sorolla);
            color: var(--texto-claro); padding: 6px 12px;
            font-size: 0.8rem; cursor: pointer; text-transform: uppercase;
        }

        .btn-filtro.active, .btn-filtro:hover { background: var(--azul-sorolla); color: white; }

        /* Grid optimizado con CSS Grid Virtual para alto rendimiento */
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px; padding: 30px 20px;
            max-width: 1400px; margin: auto;
        }

        .obra-card {
            background: var(--bg-tarjeta); color: var(--texto-oscuro);
            border-radius: 4px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s;
            display: flex; flex-direction: column;
            contain: content; /* Evita que el navegador recalcule toda la web */
        }

        .obra-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(214,102,19,0.3); }

        .img-container { width: 100%; height: 200px; background: #e0dbd0; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 15px; }
        .card-body h3 { margin: 0; font-size: 1rem; color: var(--azul-sorolla); }
        .card-body .autor { font-weight: bold; color: var(--verde-oliva); font-size: 0.8rem; margin: 5px 0; }

        /* Modal */
        .modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display:none;
            justify-content:center; align-items:center; z-index: 1000; padding: 20px;
        }

        .modal-content {
            background: var(--bg-tarjeta); color: var(--texto-oscuro);
            max-width: 800px; width: 100%; max-height: 85vh;
            display: grid; grid-template-columns: 1fr;
            border-radius: 6px; overflow: hidden; position: relative;
        }

        @media (min-width: 768px) { .modal-content { grid-template-columns: 1fr 1fr; } }
        .modal-img { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .modal-text { padding: 30px; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 1.8rem; cursor: pointer; color: var(--naranja-acento); }
    </style>
</head>
<body>

<header>
    <h1>HISTORIA DA <span>ARTE</span></h1>
    <p>Gran Enciclopedia Virtual — 300+ Obras Maestras</p>
</header>

<div class="filtro-bar">
    <button class="btn-filtro active" onclick="filtrar('Todas')">Todas</button>
    <button class="btn-filtro" onclick="filtrar('Antigüedad')">Antigüedad</button>
    <button class="btn-filtro" onclick="filtrar('Medieval')">Medieval</button>
    <button class="btn-filtro" onclick="filtrar('Renacimiento')">Renacimiento</button>
    <button class="btn-filtro" onclick="filtrar('Barroco')">Barroco</button>
    <button class="btn-filtro" onclick="filtrar('Contemporáneo')">Contemporáneo</button>
</div>

<main class="galeria-grid" id="main-grid"></main>

<div class="modal" id="modal" onclick="if(event.target===this) cerrarModal()">
    <div class="modal-content">
        <span class="close-btn" onclick="cerrarModal()">&times;</span>
        <img id="m-img" class="modal-img">
        <div class="modal-text">
            <h2 id="m-titulo"></h2>
            <p><strong id="m-autor"></strong> | <span id="m-fecha"></span></p>
            <p id="m-desc" style="line-height: 1.5; color: #333;"></p>
            <p><strong>Ubicación:</strong> <span id="m-loc"></span></p>
        </div>
    </div>
</div>

<script>
let db = [];
const grid = document.getElementById('main-grid');

// CARGA ASÍNCRONA: Fluidez total al separar los datos del diseño
async function cargarBaseDeDatos() {
    try {
        const respuesta = await fetch('obras.json');
        db = await respuesta.json();
        render("Todas");
    } catch (error) {
        console.error("Error cargando el catálogo de arte:", error);
    }
}

function render(filtro) {
    let fragment = "";
    // Optimización: filtrado directo en memoria ultrarrápido
    const filtradas = filtro === "Todas" ? db : db.filter(o => o.e === filtro);
    
    filtradas.forEach(o => {
        fragment += `
            <div class="obra-card" onclick="abrir(${o.id})">
                <div class="img-container">
                    <img src="${o.i}" loading="lazy" alt="${o.t}">
                </div>
                <div class="card-body">
                    <h3>${o.t}</h3>
                    <p class="autor">${o.a}</p>
                </div>
            </div>`;
    });
    grid.innerHTML = fragment;
}

function filtrar(estilo) {
    document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    render(estilo);
}

function abrir(id) {
    const o = db.find(x => x.id === id);
    document.getElementById('m-img').src = o.i;
    document.getElementById('m-titulo').innerText = o.t;
    document.getElementById('m-autor').innerText = o.a;
    document.getElementById('m-fecha').innerText = o.f;
    document.getElementById('m-desc').innerText = o.d;
    document.getElementById('m-loc').innerText = o.l;
    document.getElementById('modal').style.display = "flex";
}

function cerrarModal() { document.getElementById('modal').style.display = "none"; }

// Inicializar la carga inteligente
cargarBaseDeDatos();
</script>
</body>
</html>
