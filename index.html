<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búnker Digital - Protagonista</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 12px;
            background: #161b22;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
        }
        p {
            color: #8b949e;
            font-size: 1.1em;
        }
        .status {
            display: inline-block;
            padding: 6px 12px;
            background: #238636;
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Portal de Operaciones Estelares</h1>
        <p>Sistemas locales sincronizados. Proyecto Web en línea.</p>
        <div class="status">NÚCLEO ONLINE</div>
    </div>
</body>
</html>
