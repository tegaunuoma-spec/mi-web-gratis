<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia da Arte - Galería Virtual</title>
    <style>
        /* Paleta de colores inspirada en el libro de Vicens Vives y Sorolla */
        :root {
            --bg-bunker: #1c1916;        /* Crema con tinte oscuro (Fondo premium) */
            --bg-tarjeta: #fdfbf7;       /* Crema claro (Papel de libro satinado) */
            --azul-sorolla: #16407a;     /* El azul profundo del mar */
            --naranja-acento: #d66613;   /* El naranja tipográfico del libro */
            --verde-oliva: #436953;      /* El verde del cuadro y vegetación */
            --texto-oscuro: #2c251e;     /* Texto principal en tarjetas */
            --texto-claro: #f4eee1;      /* Texto en el fondo oscuro */
        }

        body {
            background-color: var(--bg-bunker);
            color: var(--texto-claro);
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid var(--naranja-acento);
            background: linear-gradient(to bottom, #26221e, var(--bg-bunker));
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--texto-claro);
            margin: 0;
        }

        header h1 span {
            color: var(--naranja-acento);
        }

        header p {
            font-style: italic;
            color: #a89f91;
            margin-top: 10px;
        }

        /* 1. SISTEMA DE FILTRADO (Taxonomía) */
        .filtro-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .btn-filtro {
            background: transparent;
            border: 2px solid var(--azul-sorolla);
            color: var(--texto-claro);
            padding: 8px 18px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .btn-filtro.active, .btn-filtro:hover {
            background-color: var(--azul-sorolla);
            border-color: var(--azul-sorolla);
            color: var(--bg-tarjeta);
            box-shadow: 0 4px 10px rgba(22, 64, 122, 0.4);
        }

        /* Cuadrícula de la Galería */
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        .tarjeta-obra {
            background-color: var(--bg-tarjeta);
            color: var(--texto-oscuro);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s, border-color 0.3s;
            border: 3px solid transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .tarjeta-obra:hover {
            transform: translateY(-8px);
            border-color: var(--naranja-acento);
        }

        .contenedor-img {
            width: 100%;
            height: 260px;
            overflow: hidden;
            background-color: #eee;
        }

        .contenedor-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .tarjeta-obra:hover .contenedor-img img {
            transform: scale(1.05);
        }

        .info-obra {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .info-obra h3 {
            margin: 0 0 5px 0;
            color: var(--azul-sorolla);
            font-size: 1.3rem;
        }

        .info-obra .artista {
            font-weight: bold;
            color: var(--verde-oliva);
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .info-obra .resumen {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #554d42;
        }

        /* 2. MODAL DE DETALLES (Profundización) */
        .modal-bunker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(16, 14, 12, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-bunker.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-contenido {
            background-color: var(--bg-tarjeta);
            color: var(--texto-oscuro);
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            border-radius: 12px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 2px solid var(--naranja-acento);
            display: grid;
            grid-template-columns: 1fr;
        }

        @media(min-width: 768px) {
            .modal-contenido {
                grid-template-columns: 1fr 1fr;
            }
        }

        .modal-cerrar {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--naranja-acento);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 300px;
        }

        .modal-detalles-box {
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .modal-detalles-box h2 {
            margin: 0 0 10px 0;
            color: var(--azul-sorolla);
        }

        .modal-meta {
            font-size: 0.9rem;
            margin-bottom: 15px;
            border-left: 3px solid var(--naranja-acento);
            padding-left: 10px;
        }

        .modal-meta p {
            margin: 4px 0;
        }

        .modal-desc {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #443c34;
        }
    </style>
</head>
<body>

    <header>
        <h1>Historia da <span>Arte</span></h1>
        <p>Inspirado en el Legado Editorial de la Humanidad</p>
    </header>

    <div class="filtro-bar">
        <button class="btn-filtro active" onclick="filtrarObras('Todas', this)">Todas las Obras</button>
        <button class="btn-filtro" onclick="filtrarObras('Impresionismo', this)">Impresionismo</button>
        <button class="btn-filtro" onclick="filtrarObras('Renacimiento', this)">Renacimiento</button>
        <button class="btn-filtro" onclick="filtrarObras('Escultura', this)">Escultura</button>
    </div>

    <main class="galeria-grid" id="galeria"></main>

    <div class="modal-bunker" id="modal-obra">
        <div class="modal-contenido">
            <button class="modal-cerrar" onclick="cerrarModal()">&times;</button>
            <div class="modal-img-box">
                <img id="modal-img" src="" alt="">
            </div>
            <div class="modal-detalles-box">
                <h2 id="modal-titulo"></h2>
                <div class="modal-meta">
                    <p><strong>Artista:</strong> <span id="modal-artista"></span></p>
                    <p><strong>Año:</strong> <span id="modal-ano"></span></p>
                    <p><strong>Ubicación:</strong> <span id="modal-museo"></span></p>
                </div>
                <p class="modal-desc" id="modal-descripcion"></p>
            </div>
        </div>
    </div>

    <script>
        // 3. DINAMISMO MEDIANTE JSON (Simulando respuesta de archivo externo de base de datos)
        const datosObrasJSON = `[
            {
                "id": 1,
                "titulo": "Paseo a orillas del mar",
                "artista": "Joaquín Sorolla",
                "estilo": "Impresionismo",
                "ano": "1909",
                "museo": "Museo Sorolla (Madrid, España)",
                "resumen": "La obra culmen del luminismo español que viste la portada del manual.",
                "descripcion": "Esta obra maestra representa a la esposa del pintor, Clotilde García, y a su hija mayor, María, paseando por la playa de Valencia. Destaca por el uso sublime de la luz, el viento reflejado en los vestidos blancos y la paleta de azules y cremas que define el estilo de Sorolla.",
                "img": "https://upload.wikimedia.org/wikipedia/commons/1/1e/Paseo_a_orillas_del_mar_-_Joaqu%C3%ADn_Sorolla.jpg"
            },
            {
                "id": 2,
                "titulo": "La Mona Lisa",
                "artista": "Leonardo da Vinci",
                "estilo": "Renacimiento",
                "ano": "1503",
                "museo": "Museo del Louvre (París, Francia)",
                "resumen": "El retrato más enigmático y famoso del Renacimiento italiano.",
                "descripcion": "También conocida como La Gioconda, esta obra es célebre por la técnica del 'sfumato' desarrollada por Da Vinci, la cual otorga una atmósfera vaporosa y un misticismo único a la sonrisa de la modelo.",
                "img": "https://upload.wikimedia.org/wikipedia/commons/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg"
            },
            {
                "id": 3,
                "titulo": "El Pensador",
                "artista": "Auguste Rodin",
                "estilo": "Escultura",
                "ano": "1904",
                "museo": "Museo Rodin (París, Francia)",
                "resumen": "La cúspide de la escultura moderna y el intelecto humano.",
                "descripcion": "Originalmente concebida para formar parte del conjunto 'Las Puertas del Infierno', esta imponente escultura en bronce representa al ser humano en profunda meditación, combatiendo una lucha interna a través de la tensión muscular.",
                "img": "https://upload.wikimedia.org/wikipedia/commons/d/d4/Le_Penseur_-_Mus%C3%A9e_Rodin.jpg"
            },
            {
                "id": 4,
                "titulo": "La Noche Estrellada",
                "artista": "Vincent van Gogh",
                "estilo": "Impresionismo",
                "ano": "1889",
                "museo": "MoMA (Nueva York, EE. UU.)",
                "resumen": "Una obra maestra del postimpresionismo cargada de fuerza emocional.",
                "descripcion": "Pintada desde la ventana del asilo en Saint-Rémy-de-Provence, refleja la turbulencia interna de Van Gogh mediante pinceladas vigorosas en forma de remolinos amarillos y azules profundos.",
                "img": "https://upload.wikimedia.org/wikipedia/commons/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg"
            }
        ]`;

        // Parseamos la cadena de texto simulando una petición fetch() de datos externos
        const baseDeDatos = JSON.parse(datosObrasJSON);
        const grid = document.getElementById('galeria');

        // Función para renderizar las tarjetas en pantalla
        function renderizarGaleria(lista) {
            grid.innerHTML = "";
            lista.forEach(obra => {
                grid.innerHTML += `
                    <div class="tarjeta-obra" onclick="abrirDetalles(${obra.id})">
                        <div class="contenedor-img">
                            <img src="${obra.img}" alt="${obra.titulo}">
                        </div>
                        <div class="info-obra">
                            <h3>${obra.titulo}</h3>
                            <div class="artista">${obra.artista}</div>
                            <p class="resumen">${obra.resumen}</p>
                        </div>
                    </div>
                `;
            });
        }

        // Lógica de Filtrado Taxonómico
        function filtrarObras(estilo, elementoBoton) {
            // Cambiar clase activa en los botones
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('active'));
            elementoBoton.classList.add('active');

            if (estilo === 'Todas') {
                renderizarGaleria(baseDeDatos);
            } else {
                const filtradas = baseDeDatos.filter(o => o.estilo === estilo);
                renderizarGaleria(filtradas);
            }
        }

        // Lógica del Modal (Profundización de Datos)
        function abrirDetalles(id) {
            const obra = baseDeDatos.find(o => o.id === id);
            if (!obra) return;

            document.getElementById('modal-img').src = obra.img;
            document.getElementById('modal-titulo').textContent = obra.titulo;
            document.getElementById('modal-artista').textContent = obra.artista;
            document.getElementById('modal-ano').textContent = obra.ano;
            document.getElementById('modal-museo').textContent = obra.museo;
            document.getElementById('modal-descripcion').textContent = obra.descripcion;

            document.getElementById('modal-obra').classList.add('show');
        }

        function cerrarModal() {
            document.getElementById('modal-obra').classList.remove('show');
        }

        // Renderizado inicial al cargar la página
        renderizarGaleria(baseDeDatos);
    </script>
</body>
</html>
