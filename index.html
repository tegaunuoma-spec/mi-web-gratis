<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola Cuántica - YouTube Music API</title>
    <style>
        :root {
            --bg-principal: #161920;
            --bg-tarjeta: #1f242e;
            --texto: #e4e7ed;
            --texto-secundario: #8a95a5;
            --pastel-azul: #6c8eae;
            --borde: #2d3545;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .bunker-panel {
            border: 1px solid var(--borde);
            padding: 30px;
            border-radius: 20px;
            background: var(--bg-tarjeta);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            text-align: center;
        }

        .status-monitor {
            font-size: 0.85rem;
            color: var(--texto-secundario);
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        #track-titulo {
            color: var(--pastel-azul);
            font-weight: bold;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--borde);
            border-radius: 8px;
            color: var(--texto);
            font-size: 0.9rem;
            box-sizing: border-box;
            margin-bottom: 10px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--pastel-azul);
        }

        .info-tip {
            font-size: 0.75rem;
            color: var(--texto-secundario);
            margin-bottom: 20px;
            text-align: center;
        }

        /* Lista Dinámica de Resultados */
        .track-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 25px;
            padding-left: 0;
            list-style: none;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .track-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.2s;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .track-item:hover {
            background: rgba(108, 142, 174, 0.1);
            border-color: var(--pastel-azul);
            color: var(--pastel-azul);
        }

        .track-duration {
            font-size: 0.75rem;
            color: var(--texto-secundario);
        }

        audio {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="bunker-panel">
        <h1>Consola de Red Global</h1>
        
        <div class="status-monitor">
            <span>📡 REPRODUCIENDO: </span>
            <span id="track-titulo">Ninguna pista armada</span>
        </div>

        <input type="text" id="buscador" class="search-box" placeholder="Escribe una canción y pulsa Enter...">
        <div class="info-tip">Presiona la tecla Enter para buscar en la base de datos</div>
        
        <ul id="lista-canciones" class="track-list">
            <li style="text-align: center; color: var(--texto-secundario); padding: 20px;">
                La base de datos está vacía. Esperando consulta...
            </li>
        </ul>

        <audio id="reproductor" controls>
            <source id="audio-origen" src="" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const reproductor = document.getElementById('reproductor');
        const audioOrigen = document.getElementById('audio-origen');
        const trackTitulo = document.getElementById('track-titulo');
        const buscador = document.getElementById('buscador');
        const listaCanciones = document.getElementById('lista-canciones');

        // Escuchamos cuando presionas 'Enter' en el buscador
        buscador.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query.length > 2) {
                    buscarEnCatalogo(query);
                }
            }
        });

        // Conexión asíncrona con la API pública de música
        async function buscarEnCatalogo(cancion) {
            listaCanciones.innerHTML = '<li style="text-align: center; color: var(--pastel-azul); padding: 20px;">Buscando en la matriz...</li>';
            
            try {
                // Usamos una API espejo de simulación de streaming libre (basada en bases de datos abiertas)
                const respuesta = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(cancion)}&media=music&limit=10`);
                const datos = await respuesta.json();
                
                listaCanciones.innerHTML = ''; // Limpiamos el mensaje de carga

                if (datos.resultCount === 0) {
                    listaCanciones.innerHTML = '<li style="text-align: center; color: var(--pastel-rojo); padding: 20px;">No se encontraron resultados en la red.</li>';
                    return;
                }

                // Inyectamos dinámicamente los resultados encontrados
                datos.results.forEach(track => {
                    const li = document.createElement('li');
                    li.className = 'track-item';
                    // Guardamos la URL de streaming real en los atributos de datos
                    li.setAttribute('data-url', track.previewUrl);
                    li.setAttribute('data-name', `${track.artistName} - ${track.trackName}`);
                    
                    // Convertimos milisegundos a formato minutos:segundos
                    const min = Math.floor(track.trackTimeMillis / 60000);
                    const seg = ((track.trackTimeMillis % 60000) / 1000).toFixed(0).padStart(2, '0');

                    li.innerHTML = `
                        <div>
                            <strong>${track.trackName}</strong><br>
                            <span style="color: var(--texto-secundario); font-size: 0.75rem;">${track.artistName}</span>
                        </div>
                        <span class="track-duration">${min}:${seg}</span>
                    `;

                    // Asignamos el evento de reproducción a este nuevo elemento vivo
                    li.addEventListener('click', function() {
                        audioOrigen.src = this.getAttribute('data-url');
                        trackTitulo.textContent = this.getAttribute('data-name');
                        reproductor.load();
                        reproductor.play();
                    });

                    listaCanciones.appendChild(li);
                });

            } catch (error) {
                console.error("Error en la conexión:", error);
                listaCanciones.innerHTML = '<li style="text-align: center; color: var(--pastel-rojo); padding: 20px;">Error de enlace cuántico. Inténtalo de nuevo.</li>';
            }
        }
    </script>

</body>
</html>
