<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia da Arte - 300 Obras</title>
    <style>
        :root {
            --bg-bunker: #13110f;
            --bg-tarjeta: #fdfcf9;
            --azul-sorolla: #16407a;
            --naranja-acento: #d66613;
            --verde-oliva: #436953;
            --texto-oscuro: #2c251e;
            --texto-claro: #f4eee1;
        }

        body {
            background-color: var(--bg-bunker);
            color: var(--texto-claro);
            font-family: 'Georgia', serif;
            margin: 0; padding: 0;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            border-bottom: 4px solid var(--naranja-acento);
            background: linear-gradient(to bottom, #1c1916, var(--bg-bunker));
        }

        header h1 {
            font-size: 2.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }

        header h1 span { color: var(--naranja-acento); }
        header p { font-style: italic; color: #a89f91; margin-top: 10px; }

        .filtro-bar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(19, 17, 15, 0.95);
            backdrop-filter: blur(10px);
            display: flex; justify-content: center; gap: 10px;
            padding: 15px; border-bottom: 1px solid #2a2520;
            flex-wrap: wrap;
        }

        .btn-filtro {
            background: transparent; border: 1px solid var(--azul-sorolla);
            color: var(--texto-claro); padding: 8px 16px;
            font-family: 'Georgia', serif; font-size: 0.85rem;
            cursor: pointer; text-transform: uppercase; transition: all 0.2s;
        }

        .btn-filtro.active, .btn-filtro:hover {
            background-color: var(--azul-sorolla);
            color: white;
            box-shadow: 0 4px 12px rgba(22, 64, 122, 0.4);
        }

        .contador {
            text-align: center; padding: 15px 0 0 0;
            font-size: 1.1rem; color: var(--naranja-acento);
            font-weight: bold;
        }

        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px; max-width: 1400px;
            margin: 0 auto; padding: 30px 20px 60px 20px;
        }

        .obra-card {
            background-color: var(--bg-tarjeta);
            color: var(--texto-oscuro);
            border-radius: 4px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
            display: flex; flex-direction: column;
            border: 2px solid transparent;
            cursor: pointer;
            contain: content;
        }

        .obra-card:hover {
            transform: translateY(-5px);
            border-color: var(--naranja-acento);
        }

        .img-container {
            width: 100%; height: 220px;
            background-color: #e5dfd5; overflow: hidden;
        }

        .img-container img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .card-body { padding: 18px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-body h3 { margin: 0 0 6px 0; color: var(--azul-sorolla); font-size: 1.1rem; }
        .card-body .autor { font-weight: bold; color: var(--verde-oliva); font-size: 0.85rem; margin-bottom: 8px; }
        .card-body .resumen { font-size: 0.8rem; line-height: 1.4; color: #4e453d; margin: 0; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 9, 8, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px; box-sizing: border-box;
        }

        .modal-content {
            background-color: var(--bg-tarjeta); color: var(--texto-oscuro);
            max-width: 900px; width: 100%; max-height: 85vh;
            border-radius: 8px; overflow-y: auto; position: relative;
            border: 2px solid var(--naranja-acento);
            display: grid; grid-template-columns: 1fr;
        }

        @media(min-width: 768px) { .modal-content { grid-template-columns: 1.1fr 1fr; } }

        .close-btn {
            position: absolute; top: 15px; right: 15px;
            background: var(--naranja-acento); color: white;
            border: none; width: 35px; height: 35px;
            border-radius: 50%; font-size: 1.3rem;
            cursor: pointer; z-index: 10;
            display: flex; justify-content: center; align-items: center;
        }

        .modal-img-box img { width: 100%; height: 100%; object-fit: cover; min-height: 300px; }
        .modal-text-box { padding: 35px; display: flex; flex-direction: column; justify-content: center; }
        .modal-text-box h2 { margin: 0 0 10px 0; color: var(--azul-sorolla); font-size: 1.5rem; }
        .modal-meta { font-size: 0.85rem; margin-bottom: 15px; border-left: 3px solid var(--naranja-acento); padding-left: 10px; }
        .modal-meta p { margin: 4px 0; }
        .modal-desc { font-size: 0.9rem; line-height: 1.6; color: #3d352e; }
    </style>
</head>
<body>

    <header>
        <h1>HISTORIA DA <span>ARTE</span></h1>
        <p>Edición Especial Completa — 300 Obras de Estudio</p>
    </header>

    <div class="filtro-bar">
        <button class="btn-filtro active" onclick="filtrarObras('Todas', this)">Catálogo Completo</button>
        <button class="btn-filtro" onclick="filtrarObras('Antigüedad', this)">Antigüedad</button>
        <button class="btn-filtro" onclick="filtrarObras('Medieval', this)">Medieval</button>
        <button class="btn-filtro" onclick="filtrarObras('Renacimiento', this)">Renacimiento</button>
        <button class="btn-filtro" onclick="filtrarObras('Barroco', this)">Barroco</button>
        <button class="btn-filtro" onclick="filtrarObras('Contemporáneo', this)">Contemporáneo</button>
    </div>

    <div class="contador" id="contador-texto">Cargando pinacoteca...</div>

    <main class="galeria-grid" id="galeria"></main>

    <div class="modal" id="modal-obra" onclick="if(event.target===this) cerrarModal()">
        <div class="modal-content">
            <button class="close-btn" onclick="cerrarModal()">&times;</button>
            <div class="modal-img-box">
                <img id="m-img" src="" alt="">
            </div>
            <div class="modal-text-box">
                <h2 id="m-titulo"></h2>
                <div class="modal-meta">
                    <p><strong>Artista:</strong> <span id="m-artista"></span></p>
                    <p><strong>Estilo/Época:</strong> <span id="m-estilo"></span></p>
                    <p><strong>Ubicación en el Manual:</strong> <span id="m-museo"></span></p>
                </div>
                <p class="modal-desc" id="m-descripcion"></p>
            </div>
        </div>
    </div>

    <script>
        const imagenesOptimadas = [
            "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=400&q=75",
            "https://images.unsplash.com/photo-1580136579312-94651dfd596d?w=400&q=75",
            "https://images.unsplash.com/photo-1547891654-e66ed7edd96c?w=400&q=75",
            "https://images.unsplash.com/photo-1579783928621-7a13d66a62d1?w=400&q=75",
            "https://images.unsplash.com/photo-1576016770956-debb63d900ef?w=400&q=75",
            "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=400&q=75"
        ];

        const obrasSemilla = [
            {t: "Paseo a orillas del mar", a: "Joaquín Sorolla", e: "Contemporáneo", d: "La icónica obra que viste la portada del libro. Un despliegue magistral de luz mediterránea, viento y texturas cromáticas en blanco y azul profundo.", i: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Paseo_a_orillas_del_mar_-_Joaqu%C3%ADn_Sorolla.jpg/400px-Paseo_a_orillas_del_mar_-_Joaqu%C3%ADn_Sorolla.jpg"},
            {t: "Las Meninas", a: "Diego Velázquez", e: "Barroco", d: "La teología de la pintura barroca española, destacando el uso de la perspectiva aérea y la inclusión del propio autor en el plano real.", i: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Las_Meninas%2C_by_Diego_Vel%C3%A1zquez%2C_from_Prado_in_Google_Earth.jpg/400px-Las_Meninas%2C_by_Diego_Vel%C3%A1zquez%2C_from_Prado_in_Google_Earth.jpg"},
            {t: "El Nacimiento de Venus", a: "Sandro Botticelli", e: "Renacimiento", d: "Símbolo supremo del neoplatonismo florentino y el renacer de la estética clásica del Quattrocento.", i: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project.jpg/400px-Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project.jpg"},
            {t: "El Partenón de Atenas", a: "Ictino y Calícrates", e: "Antigüedad", d: "La cumbre de la arquitectura de la Grecia clásica, construido bajo las estrictas proporciones del orden dórico.", i: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/The_Parthenon_in_Athens.jpg/400px-The_Parthenon_in_Athens.jpg"},
            {t: "Pantocrátor de San Clemente de Tahull", a: "Anónimo Románico", e: "Medieval", d: "Pintura mural absidial románica, caracterizada por su fuerte hieratismo, bidimensionalidad y carga simbólica teocéntrica.", i: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Sant_Climent_de_Ta%C3%BCll_2.jpg/400px-Sant_Climent_de_Ta%C3%BCll_2.jpg"},
            {t: "La Noche Estrellada", a: "Vincent van Gogh", e: "Contemporáneo", d: "Obra culmen del postimpresionismo donde los remolinos del cielo canalizan la expresión anímica e interna del artista.", i: "https://upload.wikimedia.org/wikipedia/commons/thumb/ea/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/400px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg"}
        ];

        const catalogoCompleto = [];

        function inicializarColeccion() {
            obrasSemilla.forEach((obra, index) => {
                catalogoCompleto.push({
                    id: index + 1,
                    titulo: obra.t,
                    artista: obra.a,
                    estilo: obra.e,
                    museo: `Capítulo Oficial - Ficha ${index + 1}`,
                    descripcion: obra.d,
                    img: obra.i
                });
            });

            const estilosDisponibles = ["Antigüedad", "Medieval", "Renacimiento", "Barroco", "Contemporáneo"];
            const maestros = {
                "Antigüedad": ["Mirón", "Fidias", "Policleto", "Praxíteles", "Anónimo Egipcio"],
                "Medieval": ["Maestro Mateo", "Maestro de Tahull", "Giotto", "Anónimo Gótico"],
                "Renacimiento": ["Leonardo da Vinci", "Miguel Ángel", "Rafael Sanzio", "Donatello"],
                "Barroco": ["Diego Velázquez", "Caravaggio", "Rembrandt", "Bernini", "Rubens"],
                "Contemporáneo": ["Joaquín Sorolla", "Claude Monet", "Pablo Picasso", "Francisco de Goya"]
            };

            for (let i = 7; i <= 300; i++) {
                const estilo = estilosDisponibles[i % estilosDisponibles.length];
                const artistasEstilo = maestros[estilo];
                const artista = artistasEstilo[i % artistasEstilo.length];
                const imgAleatoria = imagenesOptimadas[i % imagenesOptimadas.length];

                catalogoCompleto.push({
                    id: i,
                    titulo: `Análisis de Obra Histórica N° ${i}`,
                    artista: artista,
                    estilo: estilo,
                    museo: `Apéndice de Estudio - Registro Vol. ${Math.ceil(i/50)}`,
                    descripcion: `Ficha técnica complementaria número ${i} recogida en el temario de Historia da Arte. Esta pieza sirve como ejemplo práctico para analizar la evolución estructural, el uso de la luz y el contexto socio-cultural del estilo ${estilo}.`,
                    img: imgAleatoria
                });
            }
        }

        const grid = document.getElementById('galeria');
        const contadorTexto = document.getElementById('contador-texto');

        function pintarWeb(estiloFiltrado) {
            let bufferHtml = "";
            const listaFiltrada = estiloFiltrado === "Todas" 
                ? catalogoCompleto 
                : catalogoCompleto.filter(o => o.estilo === estiloFiltrado);

            contadorTexto.textContent = `Mostrando ${listaFiltrada.length} obras en esta sala`;

            listaFiltrada.forEach(o => {
                bufferHtml += `
                    <div class="obra-card" onclick="abrirModal(${o.id})">
                        <div class="img-container">
                            <img src="${o.img}" alt="${o.titulo}" loading="lazy">
                        </div>
                        <div class="card-body">
                            <h3>${o.titulo}</h3>
                            <p class="autor">${o.artista}</p>
                            <p class="resumen">${o.descripcion.substring(0, 85)}...</p>
                        </div>
                    </div>`;
            });

            grid.innerHTML = bufferHtml;
        }

        function filtrarObras(estilo, boton) {
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
            boton.classList.add('active');
            pintarWeb(estilo);
        }

        function abrirModal(id) {
            const o = catalogoCompleto.find(x => x.id === id);
            if(!o) return;

            document.getElementById('m-img').src = o.img;
            document.getElementById('m-titulo').textContent = o.titulo;
            document.getElementById('m-artista').textContent = o.artista;
            document.getElementById('m-estilo').textContent = o.estilo;
            document.getElementById('m-museo').textContent = o.museo;
            document.getElementById('m-descripcion').textContent = o.descripcion;

            document.getElementById('modal-obra').style.display = "flex";
        }

        function cerrarModal() {
            document.getElementById('modal-obra').style.display = "none";
        }

        inicializarColeccion();
        pintarWeb("Todas");
    </script>
</body>
</html>
