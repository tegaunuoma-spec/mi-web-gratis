<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búnker de Audio - Lógica Base</title>
</head>
<body>

    <h1>Consola de Audio de Babata (Modo Esqueleto)</h1>
    
    <div>
        <h3>Reproduciendo ahora: <span id="track-titulo">Ninguna pista seleccionada</span></h3>
        <audio id="reproductor" controls>
            <source id="audio-origen" src="" type="audio/mpeg">
            Tu navegador no soporta el elemento de audio.
        </audio>
    </div>

    <hr>

    <div>
        <h3>Lista de Pistas Disponibles</h3>
        <button class="track-btn" data-url="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" data-name="Frecuencia Alfa - Track 1">
            Play: Tu Canción 1
        </button>
        <br><br>
        <button class="track-btn" data-url="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" data-name="Frecuencia Beta - Track 2">
            Play: Tu Canción 2
        </button>
    </div>

    <script>
        // Capturamos los elementos del DOM
        const reproductor = document.getElementById('reproductor');
        const audioOrigen = document.getElementById('audio-origen');
        const trackTitulo = document.getElementById('track-titulo');
        const botones = document.querySelectorAll('.track-btn');

        // Asignamos la lógica a cada botón
        botones.forEach(boton => {
            boton.addEventListener('click', function() {
                const urlCancion = this.getAttribute('data-url');
                const nombreCancion = this.getAttribute('data-name');

                // Cambiamos la pista en el reproductor
                audioOrigen.src = urlCancion;
                trackTitulo.textContent = nombreCancion;

                // Forzamos la carga del nuevo archivo y lo reproducimos
                reproductor.load();
                reproductor.play();
            });
        });
    </script>

</body>
</html>
